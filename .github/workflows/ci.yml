name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  lint-and-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: markdownlint
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules/**" "#.venv/**"

      - name: jq — JSON validity
        run: |
          for f in themes/*.json; do
            jq empty "$f"
          done

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Parity test
        run: uv run pytest tests/ -q

  build-vsix:
    runs-on: ubuntu-latest
    needs: lint-and-parity
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Package (dry build)
        run: npx --yes @vscode/vsce package --no-dependencies --out teragone-factory-theme.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: teragone-factory-theme.vsix
          retention-days: 14
