name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check version consistency
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          pkg_version="$(jq -r '.version' package.json)"
          changelog_version="$(awk '/^## \[[0-9]/ {gsub(/\[|\]/, "", $2); print $2; exit}' CHANGELOG.md)"
          tag_version="${GITHUB_REF#refs/tags/v}"
          if [ "${pkg_version}" != "${changelog_version}" ] || [ "${pkg_version}" != "${tag_version}" ]; then
            echo "version mismatch — package.json=${pkg_version} CHANGELOG.md=${changelog_version} tag=v${tag_version}"
            exit 1
          fi
          echo "version=${pkg_version}" >> "$GITHUB_ENV"

      - name: Package VSIX
        run: npx --yes @vscode/vsce package --no-dependencies --out "teragone-factory-theme-${{ env.version }}.vsix"

      - name: Extract changelog section
        id: changelog
        run: |
          version="${{ env.version }}"
          awk -v v="${version}" '
            $0 ~ "^## \\[" v "\\]" { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release of v${version}." > release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: teragone-factory-theme-${{ env.version }}.vsix
          fail_on_unmatched_files: true

      # --- Deferred: public registry publishing. ---
      # Uncomment once the teragone-factory publisher exists on VS Marketplace
      # (see BACKLOG.md). Requires repo secret VSCE_PAT.
      #
      # - name: Publish to VS Marketplace
      #   run: npx --yes @vscode/vsce publish --packagePath "teragone-factory-theme-${{ env.version }}.vsix" --pat "${{ secrets.VSCE_PAT }}"
      #
      # And once registered on Open VSX (requires repo secret OVSX_PAT):
      #
      # - name: Publish to Open VSX
      #   run: npx --yes ovsx publish "teragone-factory-theme-${{ env.version }}.vsix" --pat "${{ secrets.OVSX_PAT }}"
