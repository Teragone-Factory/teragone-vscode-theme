repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
        files: '\.json$'
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.14.0
    hooks:
      - id: markdownlint-cli2
        files: '\.md$'

  - repo: local
    hooks:
      - id: palette-parity
        name: palette parity (README / theme JSON / markdown CSS)
        entry: uv run pytest tests/test_palette_parity.py -q
        language: system
        pass_filenames: false
        files: '^(README\.md|themes/.*\.json|styles/.*\.css|tests/test_palette_parity\.py)$'
